---
name: CI

on:
  push:
    branches:
      - "*"
      - "**"
    tags:
      - "!*" # This excludes all tags

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

  # Allows this workflow to be called from other workflows
  workflow_call:

jobs:
  CI:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v5

      - name: Lint
        run: make lint
