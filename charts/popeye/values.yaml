# Default values for popeye.
# This is a YAML-formatted file.
# Declare variables to be passed into your templates.

args:
  - "-o"
  - "yaml"
  - "--force-exit-zero"

spinach:
  # Specifies if a spinach.yml config map should be created
  # and mounted in the pod.
  enable: false
  # Set the content of the spinach file with
  # --set-file spinach.content=/path/to/spinach.yml
  content: ""

image:
  repository: derailed/popeye
  pullPolicy: IfNotPresent
  # Overrides the image tag whose default is the chart appVersion.
  tag: ""

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

serviceAccount:
  # Specifies whether a service account should be created
  create: true
  # Annotations to add to the service account
  annotations: {}
  # The name of the service account to use.
  # If not set and create is true, a name is generated using the fullname template
  name: ""

schedule: "* * * * *"

podAnnotations: {}

podSecurityContext: {}
  # fsGroup: 2000

securityContext:
  runAsNonRoot: true
  runAsUser: 5000

resources:
  limits:
    cpu: 500m
    memory: 250Mi
  requests:
    cpu: 500m
    memory: 250Mi

nodeSelector: {}

tolerations: []

affinity: {}
